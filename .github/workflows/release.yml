name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create zip
        run: |
          mkdir -p out
          cd ..
          zip -r RCLootCouncil_wowaudit/out/RCLootCouncil_wowaudit.zip RCLootCouncil_wowaudit/ \
            --exclude "RCLootCouncil_wowaudit/.git/*" \
            --exclude "RCLootCouncil_wowaudit/.github/*" \
            --exclude "RCLootCouncil_wowaudit/out/*"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: out/RCLootCouncil_wowaudit.zip
